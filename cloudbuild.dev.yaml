# ── DEV LANE build config ──────────────────────────────────────────────────
# Mirror of cloudbuild.yaml for the dev environment. Deploy with:
#   gcloud builds submit --config=cloudbuild.dev.yaml --project=ce-bill-tracker
# (or scripts/deploy-dev.ps1). Unlike prod, this lane intentionally ships the
# WORKING TREE — dev is where you iterate.
#
# Isolation from prod:
#   - Images use the ':dev' tag, so a dev build never overwrites prod's ':latest'.
#   - Migrates/serves the 'signalscout_dev' database (separate DB, same instance)
#     via the SIGNALSCOUT_DATABASE_URL_DEV secret.
#   - Deploys the 'signalscout-api-dev' Cloud Run service (min-instances=0).
#   - Deploys the 'ce-bill-tracker-dev' Firebase Hosting site.
#   - No Stripe secrets, no outbound email/alert sends, no pipeline/classify jobs.
substitutions:
  _PROJECT_ID: ce-bill-tracker
  _REGION: us-central1
  _INSTANCE_CONNECTION_NAME: ce-bill-tracker:us-central1:signalscout-pg
  _API_IMAGE: us-central1-docker.pkg.dev/ce-bill-tracker/signalscout-images/signalscout-api
  # Dev Cloud Run URL (confirmed from the first deploy). The dashboard bakes this in at build time.
  _API_URL: https://signalscout-api-dev-pes3nxocda-uc.a.run.app

timeout: 2700s

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # ── 1. Build API image (dev tag) ──────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-api
    args:
      - build
      - -f
      - Dockerfile.api
      - -t
      - ${_API_IMAGE}:dev
      - .

  # ── 2. Push API image (dev tag only — leaves :latest untouched) ────────────
  - name: gcr.io/cloud-builders/docker
    id: push-api
    waitFor: [build-api]
    args:
      - push
      - ${_API_IMAGE}:dev

  # ── 3. Download Cloud SQL Auth Proxy into /workspace ──────────────────────
  - name: gcr.io/cloud-builders/curl
    id: download-proxy
    waitFor: [push-api]
    args:
      - -fsSL
      - -o
      - /workspace/cloud-sql-proxy
      - https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.1/cloud-sql-proxy.linux.amd64
  - name: bash
    id: chmod-proxy
    waitFor: [download-proxy]
    entrypoint: bash
    args: ["-c", "chmod +x /workspace/cloud-sql-proxy"]

  # ── 4. Run Alembic migrations against the DEV database ────────────────────
  - name: ${_API_IMAGE}:dev
    id: run-migrations
    waitFor: [chmod-proxy]
    entrypoint: bash
    secretEnv: ['DB_PASSWORD']
    args:
      - -c
      - |
        set -e

        /workspace/cloud-sql-proxy \
          --address 127.0.0.1 \
          --port 5432 \
          ${_INSTANCE_CONNECTION_NAME} &
        PROXY_PID=$$!

        for i in $$(seq 1 20); do
          python3 -c "import socket,sys; s=socket.socket(); s.settimeout(1); sys.exit(s.connect_ex(('127.0.0.1',5432)))" 2>/dev/null && break
          echo "Waiting for Cloud SQL proxy... ($${i}s)"
          sleep 1
        done

        # NOTE the database name: signalscout_dev (NOT signalscout).
        MIGRATE_OK=0
        for attempt in $$(seq 1 5); do
          echo "alembic upgrade head (DEV) — attempt $${attempt}/5"
          if DATABASE_URL="postgresql://signalscout:$${DB_PASSWORD}@127.0.0.1:5432/signalscout_dev" \
              alembic upgrade head; then
            MIGRATE_OK=1
            break
          fi
          echo "migration attempt $${attempt} failed (likely lock contention) — retrying in 15s"
          sleep 15
        done
        if [ "$${MIGRATE_OK}" != "1" ]; then
          echo "ERROR: dev migrations failed after 5 attempts" >&2
          kill $${PROXY_PID} || true
          exit 1
        fi

        # Seed target companies (idempotent) so dev mirrors prod's static company list.
        DATABASE_URL="postgresql://signalscout:$${DB_PASSWORD}@127.0.0.1:5432/signalscout_dev" \
          python3 /workspace/scripts/seed_companies.py

        kill $${PROXY_PID} || true

  # ── 5. Deploy API to Cloud Run (dev service) ──────────────────────────────
  # min-instances=0: dev scales to zero to save cost (cold start is acceptable).
  # DATABASE_URL points at the dev DB. No Stripe secrets. Email/alert sends off.
  - name: gcr.io/cloud-builders/gcloud
    id: deploy-api
    waitFor: [run-migrations]
    args:
      - run
      - deploy
      - signalscout-api-dev
      - --image=${_API_IMAGE}:dev
      - --region=${_REGION}
      - --platform=managed
      - --min-instances=0
      - --max-instances=1
      - --cpu=1
      - --memory=1Gi
      - --timeout=300
      - --add-cloudsql-instances=${_INSTANCE_CONNECTION_NAME}
      - --service-account=signalscout-api@${_PROJECT_ID}.iam.gserviceaccount.com
      - --set-secrets=DATABASE_URL=SIGNALSCOUT_DATABASE_URL_DEV:latest,LEGISCAN_API_KEY=LEGISCAN_API_KEY:latest,OPEN_STATES_API_KEY=OPEN_STATES_API_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,COURTLISTENER_API_TOKEN=COURTLISTENER_API_TOKEN:latest
      - --set-env-vars=ENABLE_LLM_CLASSIFICATION=true,ENABLE_SONNET_EXTRACTION=true,ENABLE_COURTLISTENER=false,ENABLE_INTERPRETATION=true,ENABLE_OPENSTATES_INGESTION=false,ENABLE_LEGISCAN_INGESTION=false,ENABLE_EURLEX_INGESTION=true,ENABLE_TRIAL_REMINDERS=false,ENABLE_LINK_AUDIT=false,ENABLE_BILL_TEXT_REFRESH=false,ENABLE_WATCHLIST_RECAP=false,ENABLE_NEW_BILL_ALERTS=false,ENABLE_DIGEST=false,ENABLE_WELCOME_EMAIL=false,FIREBASE_PROJECT_ID=ce-bill-tracker,APP_BASE_URL=https://ce-bill-tracker-dev.web.app,API_BASE_URL=${_API_URL}
      - --allow-unauthenticated
      - --port=8080

  # ── 6. Build Next.js dashboard (static export, dev API URL baked in) ───────
  - name: node:20
    id: build-dashboard-next
    waitFor: [deploy-api]
    entrypoint: bash
    args:
      - -c
      - |
        cd dashboard-next
        npm ci
        NEXT_PUBLIC_API_BASE_URL=${_API_URL} node scripts/build-snapshot.mjs || echo "snapshot generation failed — shipping without a baked snapshot"
        NEXT_PUBLIC_API_BASE_URL=${_API_URL} \
        NEXT_PUBLIC_DEMO_MODE=false \
        npm run build

  # ── 7. Deploy to Firebase Hosting (dev site) ──────────────────────────────
  - name: node:20
    id: deploy-firebase
    waitFor: [build-dashboard-next]
    entrypoint: bash
    args:
      - -c
      - npm install -g firebase-tools && firebase deploy --only hosting:ce-bill-tracker-dev --project=${_PROJECT_ID} --non-interactive

availableSecrets:
  secretManager:
    - versionName: projects/${_PROJECT_ID}/secrets/SIGNALSCOUT_DB_PASSWORD/versions/latest
      env: 'DB_PASSWORD'
